# ######## Window rules ########  
windowrule = match:fullscreen false, opacity $windowOpacity override  
  
windowrule = match:class foot|equibop|org\.quickshell|imv|swappy, opaque on  # They use native transparency or we want them opaque  
windowrule = match:float true, match:xwayland false, center on  # Center all floating windows (not xwayland cause popups)  
  
# Float  
windowrule = match:class guifetch, float on  # FlafyDev/guifetch  
windowrule = match:class yad, float on  
windowrule = match:class zenity, float on  
windowrule = match:class wev, float on  
windowrule = match:class org\.gnome\.FileRoller, float on  
windowrule = match:class file-roller, float on  # WHY IS THERE TWOOOOOOOOOOOOOOOO  
windowrule = match:class blueman-manager, float on  
windowrule = match:class com\.github\.GradienceTeam\.Gradience, float on  
windowrule = match:class feh, float on  
windowrule = match:class imv, float on  
windowrule = match:class system-config-printer, float on  
windowrule = match:class org\.quickshell, float on  
  
# Float, resize and center  
windowrule = match:class foot, match:title nmtui, float on  
windowrule = match:class foot, match:title nmtui, size 30% 30%  
windowrule = match:class foot, match:title nmtui, center on  
windowrule = match:class org\.gnome\.Settings, float on  
windowrule = match:class org\.gnome\.Settings, size 70% 80%  
windowrule = match:class org\.gnome\.Settings, center on  
windowrule = match:class org\.pulseaudio\.pavucontrol|yad-icon-browser, float on  
windowrule = match:class org\.pulseaudio\.pavucontrol|yad-icon-browser, size 60% 70%  
windowrule = match:class org\.pulseaudio\.pavucontrol|yad-icon-browser, center on  
windowrule = match:class nwg-look, float on  
windowrule = match:class nwg-look, size 50% 60%  
windowrule = match:class nwg-look, center on  
  
# Special workspaces  
windowrule = match:class btop, workspace special:sysmon  
windowrule = match:class feishin|Spotify|Supersonic, workspace special:music  
windowrule = match:initial_title Spotify( Free)?, workspace special:music  # Spotify wayland, it has no class for some reason  
windowrule = match:class discord|equibop|vesktop|whatsapp, workspace special:communication  
windowrule = match:class Todoist, workspace special:todo  
  
# Dialogs  
windowrule = match:title (Select|Open)( a)? (File|Folder)(s)?, float on  
windowrule = match:title File (Operation|Upload)( Progress)?, float on  
windowrule = match:title .* Properties, float on  
windowrule = match:title Export Image as PNG, float on  
windowrule = match:title GIMP Crash Debug, float on  
windowrule = match:title Save As, float on  
windowrule = match:title Library, float on  
  
# Picture in picture (resize and move done via script)  
windowrule = match:title Picture(-| )in(-| )[Pp]icture, move 100%-w-2% 100%-w-3%  # Initial move so window doesn't shoot across the screen from the center  
windowrule = match:title Picture(-| )in(-| )[Pp]icture, keep_aspect_ratio on  
windowrule = match:title Picture(-| )in(-| )[Pp]icture, float on  
windowrule = match:title Picture(-| )in(-| )[Pp]icture, pin on  
  
# Steam  
windowrule = match:class steam, rounding 10  
windowrule = match:class steam, match:title Friends List, float on  
windowrule = match:class steam_app_[0-9]+, immediate on  # Allow tearing for steam games  
windowrule = match:class steam_app_[0-9]+, idle_inhibit always  # Always idle inhibit when playing a steam game  
  
# ATLauncher console  
windowrule = match:class com-atlauncher-App, match:title ATLauncher Console, float on  
  
# Autodesk Fusion 360  
windowrule = match:class fusion360\.exe, match:title Fusion360|(Marking Menu), no_blur on  
  
# Ugh xwayland popups  
windowrule = match:xwayland true, match:title win[0-9]+, no_dim on  
windowrule = match:xwayland true, match:title win[0-9]+, no_shadow on  
windowrule = match:xwayland true, match:title win[0-9]+, rounding 10  
  
# ######## Workspace rules ########  
workspace = w[tv1]s[false], gapsout:$singleWindowGapsOut  
workspace = f[1]s[false], gapsout:$singleWindowGapsOut  
  
# ######## Layer rules ########  
layerrule = match:namespace hyprpicker, animation fade  # Colour picker out animation  
layerrule = match:namespace logout_dialog, animation fade  # wlogout  
layerrule = match:namespace selection, animation fade  # slurp  
layerrule = match:namespace wayfreeze, animation fade  
  
# Fuzzel  
layerrule = match:namespace launcher, animation popin 80%  
layerrule = match:namespace launcher, blur on  
  
# Shell  
layerrule = match:namespace caelestia-(border-exclusion|area-picker), no_anim on  
layerrule = match:namespace caelestia-(drawers|background), animation fade  
  
layerrule = match:namespace caelestia-drawers, blur on  
layerrule = match:namespace caelestia-drawers, ignore_alpha 0.57  
